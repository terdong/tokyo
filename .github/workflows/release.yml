name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version_check
        run: |
          CURRENT_VERSION=$(grep -E 'ThisBuild\s*/\s*version\s*:=\s*".*"' build.sbt | sed -E 's/.*version\s*:=\s*"([^"]*)".*/\1/')
          
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git show HEAD~1:build.sbt >/dev/null 2>&1; then
              PREV_VERSION=$(git show HEAD~1:build.sbt | grep -E 'ThisBuild\s*/\s*version\s*:=\s*".*"' | sed -E 's/.*version\s*:=\s*"([^"]*)".*/\1/')
            else
              PREV_VERSION="none"
            fi
          else
            PREV_VERSION="none"
          fi
          
          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREV_VERSION"
          
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Set up sbt
        if: steps.version_check.outputs.version_changed == 'true'
        uses: sbt/setup-sbt@v1

      - name: Run tests
        if: steps.version_check.outputs.version_changed == 'true'
        run: sbt test

      - name: Package artifacts
        if: steps.version_check.outputs.version_changed == 'true'
        run: sbt package

      - name: Create and push tag
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.version }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

      - name: Create GitHub Release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_check.outputs.version }}
          files: |
            jvm/target/scala-*/*.jar
            js/target/scala-*/*.jar
            testkit/jvm/target/scala-*/*.jar
            testkit/js/target/scala-*/*.jar
          generate_release_notes: true
