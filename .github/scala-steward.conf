# 1. Group kyo-core updates to manage them separately
pullRequests.grouping = [
  {
    name = "kyo-updates",
    title = "Kyo Library Updates",
    filter = [{"group" = "io.getkyo", "artifact" = "kyo-core"}]
  }
]

# 2. Set commit messages in English
commits.message = "chore(deps): update ${artifactName} from ${currentVersion} to ${nextVersion}"

# 3. Create PRs for Kyo updates as soon as possible
pullRequests.frequency = "@asap"

# 4. Disable draft mode so that CI success can trigger auto-merge immediately
pullRequests.draft = false

# 5. Allow updates only for kyo-core
updates.allow = [ { groupId = "io.getkyo", artifactId = "kyo-core" } ]

# 6. Add custom labels to facilitate auto-merge
pullRequests.customLabels = [ "dependencies", "auto-merge" ]

# 7. Additional settings
scalafmt.runAfterUpgrading = true
signoffCommits = true

# 8. Post-update hook: Automagically bump project version after dependency update
postUpdateHooks = [{
  command = ["bash", ".github/scripts/bump-version.sh"],
  commitMessage = "chore(deps): update kyo and bump version to ${nextVersion}"
}]